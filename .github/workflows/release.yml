name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 手動トリガーも許可（テスト用）

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: termrain

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon ランナー
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13            # Intel Mac ランナー
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          # Homebrew Formula が `bin.install "termrain"` 一発で済むよう、
          # アーカイブのトップに binary とドキュメントを直接置く
          # (サブディレクトリで包まない)
          name="${BIN_NAME}-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir staging
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" staging/
          cp README.md README.ja.md LICENSE staging/ 2>/dev/null || true
          tar -czf "${name}.tar.gz" -C staging .
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "${env:BIN_NAME}-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "staging" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "staging/"
          if (Test-Path README.md)    { Copy-Item README.md staging/ }
          if (Test-Path README.ja.md) { Copy-Item README.ja.md staging/ }
          if (Test-Path LICENSE)      { Copy-Item LICENSE staging/ }
          Compress-Archive -Path "staging/*" -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash + "  $name.zip" | Out-File "$name.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-*.tar.gz
            ${{ env.BIN_NAME }}-*.tar.gz.sha256
            ${{ env.BIN_NAME }}-*.zip
            ${{ env.BIN_NAME }}-*.zip.sha256
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # tag push の時だけリリース化（workflow_dispatch では artifact だけ作ってリリース化はスキップ）
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true
